services:
  ai-agent:
    build: .
    container_name: ai_agent_flask_container
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: always
    volumes:
      - agent_flask_data:/app

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  agent_flask_data:
  qdrant_data:
